<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/resize@3.x.x/dist/cdn.min.js"></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <title>Pie Chart</title>
</head>
<body>

    <div x-data="chart">
        
        <div class="mb-30">
            <button @click="drawChart">
                Draw Chart
            </button>

        
            <input x-model="config.innerRadius" type="range" min="0" max="200" step="10">

            <input x-model="config.outerRadius" type="range" min="200" max="400" step="10">

            <input x-model="config.explodeOffset" type="range" min="0" max="20" step="1">

            <input x-model.number="config.zeroOffset" type="range" min="-180" max="180" step="1">

            <input x-model.number="config.gapDegrees" type="range" min="0" max="4" step="0.25">

            <input x-model="config.zeroOffset" type="text">

        </div>

        <canvas class="bg-white" @click="handleClick" class="border" x-ref="canvas">
        


        </canvas>

        <div x-effect="drawChart(config.zeroOffset)"></div>

        <div x-text="selected.label">

        </div>

        <div x-text="selected.value">

        </div>

        
    </div>


    <script>

        document.addEventListener('alpine:init', () => {
        Alpine.data('chart', () => ({

            ctx: null,

            config: {
                width: 800,
                height: 800,
                innerRadius: 0,
                outerRadius: 400,
                zeroOffset: -90,
                explodeOffset: 0,
                gapDegrees: 0.75
            },

            series: [
                {label: 'one', value: 5},
                {label: 'two', value: 2},
                {label: 'three', value: 3},
                {label: 'four', value: 4},
                {label: 'five', value: 5},
                {label: 'six', value: 30},
                {label: 'seven', value: 7},
                {label: 'eight', value: 8},
                {label: 'nine', value: 9, action(){console.log('yes')}}
            ],

            labels: [],

            selected: {},

            sliceMeta: [],

            get height() {return this.width},

            handleClick(event){

                console.log(event)

                const rect = this.ctx.canvas.getBoundingClientRect()
                const x = event.clientX - rect.left
                const y = event.clientY - rect.top
                let cx = this.config.width / 2
                let cy = this.config.height / 2

                const dx = x - cx
                const dy = y - cy

                // distance from center
                const dist = Math.sqrt(dx*dx + dy*dy)

                // ignore clicks outside the pie radius
                if (dist > this.config.outerRadius) return

                if (dist < this.config.innerRadius) return

                let angle = Math.atan2(dy, dx) * 180 / Math.PI;

                console.log(angle)

                // 2. Shift the angle so 12 o'clock becomes 0.
                // If your chart starts at 12 o'clock, you need to add 90 degrees 
                // because atan2 starts at 3 o'clock (90 degrees ahead of 12).
                angle = angle + this.config.zeroOffset * -1;

                // 3. Normalize to a 0-360 range
                if (angle < 0) {
                   angle += 360;
                }

                console.log(angle)

                for (const slice of this.sliceMeta) {
                    if (angle >= slice.startDegree && angle < slice.endDegree) {
                        //console.log(`Angle: ${angle} Start: ${slice.Start}`)
                        //console.log(slice)
                        this.selected = this.series[slice.index]
                        //window.open('/www.bbc.co.uk', '_self').focus();
                        //this.selected.action()
                        break
                    }
                }

            },

            degreesToRads(degrees){
                return degrees * Math.PI / 180
            },

            radiansToDegrees(radians){
                return radians * (180 / Math.PI)
            },

            generateShades(baseColor, count) {
                // Convert base color to HSL
                const { h, s, l } = this.hexToHSL(baseColor)

                const shades = []

                // Lightness range: from 85% (light) to 25% (dark)
                const minL = 15
                const maxL = 40

                for (let i = 0; i < count; i++) {
                    const lightness = maxL - (i * (maxL - minL) / (count - 1))
                    shades.push(`hsl(${h}, ${s}%, ${lightness}%)`)
                }

                return shades
            },

            hexToHSL(hex) {
                hex = hex.replace('#', '')

                let r = parseInt(hex.substring(0, 2), 16) / 255
                let g = parseInt(hex.substring(2, 4), 16) / 255
                let b = parseInt(hex.substring(4, 6), 16) / 255

                const max = Math.max(r, g, b)
                const min = Math.min(r, g, b)
                let h, s, l = (max + min) / 2

                if (max === min) {
                    h = s = 0
                } else {
                    const d = max - min
                    s = l > 0.5 ? d / (2 - max - min) : d / (max + min)

                    switch (max) {
                        case r: h = (g - b) / d + (g < b ? 6 : 1); break
                        case g: h = (b - r) / d + 2; break
                        case b: h = (r - g) / d + 4; break
                    }

                    h *= 60
                }

                return {
                    h: Math.round(h),
                    s: Math.round(s * 100),
                    l: Math.round(l * 100)
                }
            },

            setupCanvas(){

                const dpr = window.devicePixelRatio || 1

                // 1. Set CSS size (visual)
                this.ctx.canvas.style.width = this.config.width + "px"
                this.ctx.canvas.style.height = this.config.height + "px"

                // 2. Set internal bitmap size (scaled)
                this.ctx.canvas.width = this.config.width * dpr
                this.ctx.canvas.height = this.config.height * dpr

                // 3. Scale drawing operations
                this.ctx.scale(dpr, dpr)

            },
            
            drawChart(){

                this.setupCanvas()

                this.sliceMeta = []
                this.labels = []

                const gapDegrees = this.config.gapDegrees // Adjust this for the width of your "gap"
                
                let total = Math.sumPrecise(this.series.map(item => item.value))

                let scaledValues = this.series.map(item => {
                    return (item.value / total) * 360
                })


                let ctx = this.ctx
                let cx = this.config.width / 2
                let cy = this.config.height / 2

                let mx = this.config.width / 2
                let my = this.config.height / 2
                
                ctx.clearRect(0, 0, this.config.width, this.config.height)

                ctx.translate(cx, cy); 

                // 2. Rotate the entire coordinate system by -90 degrees
                ctx.rotate(this.degreesToRads(this.config.zeroOffset));
                
                let colours = this.generateShades("#008080", scaledValues.length)
                
                let currentDegree = 0;

                scaledValues.forEach((value, index) => {

                    const start = currentDegree;
                    const end = index === scaledValues.length - 1 ? 360 : currentDegree + value
                    const mid = (start + end) / 2
                    
                    const midCanvas = this.degreesToRads(mid)
                    const dx = Math.cos(midCanvas) * this.config.explodeOffset
                    const dy = Math.sin(midCanvas) * this.config.explodeOffset
                    
                    const startRad = this.degreesToRads(start + gapDegrees)
                    const endRad   = this.degreesToRads(end - gapDegrees)

                    ctx.beginPath()
                    ctx.moveTo(dx, dy)
                    ctx.fillStyle = colours[index]

                    ctx.arc(
                        dx, 
                        dy, 
                        this.config.outerRadius, 
                        startRad, 
                        endRad
                    )
                    
                    //Inner arc (reverse direction)
                    ctx.arc(
                        dx, 
                        dy, 
                        this.config.innerRadius, 
                        endRad, 
                        startRad, 
                        true
                    )

                    ctx.closePath()
                    ctx.fill()

                    let rads = this.degreesToRads(this.config.zeroOffset + mid)
                    
                    let labelRadius = this.config.outerRadius - (this.config.outerRadius - this.config.innerRadius) / 2;

                    let lx = Math.cos(rads) //* this.config.explodeOffset;
                    let ly = Math.sin(rads) //* this.config.explodeOffset;


                    this.labels.push({
                        lx: lx + Math.cos(rads) * labelRadius,
                        ly: ly + Math.sin(rads) * labelRadius
                    })

                    this.sliceMeta.push({
                        startDegree: start,
                        endDegree: end,
                        index: index,
                        value: this.series[index].value,
                        colour: colours[index]
                    })

                    currentDegree = end

                })

                // Inside your loop, after calculating lx and ly:
                // ctx.save();
                //ctx.restore();
                ctx.rotate(this.degreesToRads(this.config.zeroOffset * -1)); // Reverse the global rotation
                // // Since we are at the center, we must manually project the lx/ly 
                // // OR just draw labels outside the main rotation loop.
                ctx.restore();

                this.drawLabels()

            

            },

            drawLabels(){

                this.labels.forEach((label, index) => {

                    const minDim = Math.min(this.config.width, this.config.height)
                    const fontPx = (minDim * 0.02)   // 4% of canvas size

                    this.ctx.fillStyle = "white"
                    this.ctx.font = fontPx + "px sans-serif"
                    this.ctx.textAlign = "center"
                    this.ctx.textBaseline = "middle"

                    this.ctx.fillText(this.series[index].label, label.lx, label.ly)
                })
            },

            init(){
                this.ctx = this.$refs.canvas.getContext('2d')
            }


        }))
    })



    </script>
    
</body>
</html>
